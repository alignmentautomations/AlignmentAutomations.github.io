<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alignment Automations | Turn Online Inquiries Into Booked Appointments</title>
  <style>
    :root{
      --blue:#0066CC;
      --deep:#003D7A;
      --ink:#1A1A1A;
      --muted:#6B7280;
      --border:#E5E7EB;
      --bg:#FFFFFF;
      --soft:#F8FAFC;
      --radius:14px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Arial, sans-serif;
      color:var(--ink);
      background:var(--bg);
      line-height:1.5;
    }
    .container{max-width:1100px;margin:0 auto;padding:0 22px}
    header{background:#fff;border-bottom:1px solid var(--border);padding:14px 0}
    .logo{height:38px}
    .hero{background:linear-gradient(180deg,var(--deep),var(--blue));color:#fff;padding:80px 0}
    h1{font-size:44px;margin:0 0 16px}
    p{font-size:18px;max-width:640px}
    .btn{display:inline-block;background:var(--blue);color:#fff;padding:14px 22px;border-radius:8px;text-decoration:none;font-weight:600}
  </style>
</head>
<body>

<header>
  <div class="container">
    <img src="alignment_automations_horizontal.svg" class="logo" alt="Alignment Automations">
  </div>
</header>

<section class="hero">
  <div class="container">
    <h1>Turn Online Inquiries Into Booked Appointments</h1>
    <p>Alignment Automations helps chiropractic clinics respond instantly and book patients automatically — without adding work for your staff.</p>
    <a class="btn" href="#demo">See the Demo</a>
  </div>
</section>

</body>
</html>
